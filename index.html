<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>喫茶SUNABA</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ヘッダー -->
  <header>
    喫茶SUNABA
  </header>

  <!-- メイン画像（ここにだけ画像を置く） -->
  <div class="main-visual">
    <img src="images/main.jpg">
    <h1>やすらぎの時間４０年続くほっとする一杯</h1>
  </div>

  <!-- お店紹介 -->
  <section class="about">
    <h2>こだわりの一杯を</h2>
    <p>
      40年続く喫茶店。<br>
      オリジナルブレンドコーヒーと、どこか懐かしい味の軽食をご用意しています。
    </p>
  </section>

  <!-- メニュー -->
  <section>
    <h2>メニュー</h2>

    <div class="menu">

      <div class="menu-item">
        <img src="coffee.jpg">
        <p>ブレンドコーヒー ¥500</p>
      </div>

      <div class="menu-item">
        <img src="pudding.jpg">
        <p>自家製プリン ¥450</p>
      </div>

      <div class="menu-item">
        <img src="pasta.jpg">
        <p>ナポリタン ¥800</p>
      </div>

    </div>
  </section>

  <!-- 店舗情報 -->
  <section class="info">
    <h2>店舗情報</h2>
    <p>
      営業時間：8:00〜18:00<br>
      定休日：日曜・祝日<br>
      住所：天草市中央新町15-7
    </p>
  </section>

  <!-- フッター -->
  <footer>
    © 喫茶SUNABA
  </footer>

</body>
</html>
