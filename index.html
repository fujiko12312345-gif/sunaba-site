<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>喫茶SUNABA</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ヘッダー -->
  <header>
    喫茶SUNABA
  </header>

  <!-- メイン画像 -->
  <div class="main-visual">
    <img src="main.jpg">
    <h1>手ぶらで楽しむ、やすらぎの時間</h1>
  </div>

  <!-- お店紹介 -->
  <section class="about">
    <h2>こだわりの一杯を</h2>
    <p>
      40年続く喫茶店。<br>
      オリジナルブレンドコーヒーと、どこか懐かしい味の軽食をご用意しています。
    </p>
  </section>

  <!-- メニュー -->
  <section>
    <h2>メニュー</h2>

    <div class="menu">

      <div class="menu-item">
        <img src="coffee.jpg">
        <p>ブレンドコーヒー ¥500</p>
      </div>

      <div class="menu-item">
        <img src="pudding.jpg">
        <p>自家製プリン ¥450</p>
      </div>

      <div class="menu-item">
        <img src="pasta.jpg">
        <p>ナポリタン ¥800</p>
      </div>

    </div>
  </section>

  <!-- 店舗情報 -->
  <section class="info">
    <h2>店舗情報</h2>
    <p>
      営業時間：8:00〜18:00<br>
      定休日：日曜・祝日<br>
      住所：熊本県天草市中央新町15-7
    </p>
  </section>

  <!-- マップ -->
  <section class="map">
    <h2>アクセス</h2>

    <iframe
      src="https://www.google.com/maps?q=熊本県天草市中央新町15-7&output=embed"
      width="600"
      height="450"
      style="border:0;"
      allowfullscreen=""
      loading="lazy">
    </iframe>

  </section>
<section class="instagram-link">
  <h2>Instagram</h2>
  <p>最新の写真やお知らせはこちらから</p>

  <a href="https://www.instagram.com/fujiko_maemae/" target="_blank">
    @fujiko_maemae を見る
  </a>
</section>
  <!-- フッター -->
  <footer>
    © 喫茶SUNABA
  </footer>

</body>
</html>
